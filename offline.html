<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uzima — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <style>
    body { 
      display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; background: var(--bg); color: var(--t1); 
      padding: 2rem; text-align: center; 
    }
    .offline-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .offline-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--dim); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; color: var(--accent); font-size: 1.5rem;
    }
    .offline-card h1 { margin: 0 0 0.75rem; font-size: 1.25rem; }
    .offline-card p { margin: 0 0 1.5rem; color: var(--t3); font-size: 0.92rem; }
    .offline-card .btn { width: 100%; }
    .retry-btn {
      background: none; border: none; color: var(--accent);
      font-size: 0.88rem; cursor: pointer; margin-top: 1rem;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .retry-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again. Your data is safe and will sync when you're back online.</p>
    <button class="btn btn-primary" onclick="location.reload()">
      <i class="fas fa-rotate-right"></i> Retry
    </button>
    <button class="retry-btn" onclick="history.back()">
      <i class="fas fa-arrow-left"></i> Go Back
    </button>
  </div>
</body>
</html>
