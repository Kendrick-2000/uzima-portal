<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uzima University — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components/dashboard.css">
  <link rel="stylesheet" href="css/pages/profile.css">
</head>
<body>
  <header class="dash-nav">
    <div class="nav-left">
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
      <div class="nav-logo" aria-label="Uzima University">U</div>
      <h1 class="nav-title">Profile Settings</h1>
    </div>
    <div class="nav-right">
      <div class="nav-profile" id="navProfile">
        <div class="nav-avatar" id="navAvatar">U</div>
        <span class="nav-name" id="navName">User</span>
        <i class="fas fa-chevron-down nav-chevron"></i>
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" class="dropdown-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="courses.html" class="dropdown-item"><i class="fas fa-book"></i> Courses</a>
        <hr class="dropdown-divider">
        <button class="dropdown-item danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </div>
  </header>

  <aside class="dash-sidebar" id="dashSidebar">
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="admin.html" class="nav-link"><i class="fas fa-shield-halved"></i> Admin</a>
      <a href="courses.html" class="nav-link"><i class="fas fa-book"></i> Courses</a>
      <a href="grades.html" class="nav-link"><i class="fas fa-chart-bar"></i> Grades</a>
      <a href="schedule.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Schedule</a>
      <a href="fees.html" class="nav-link"><i class="fas fa-file-invoice"></i> Fees</a>
      <a href="#" class="nav-link active"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-status"><span class="dot live"></span><span>System Online</span></div>
      <small style="color:var(--t4)">v2.4.1 • Live Mode</small>
    </div>
  </aside>

  <main class="dash-main profile-main">
    <!-- Profile Header Card -->
    <section class="dash-card profile-header">
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <img id="profileAvatarImg" src="" alt="Avatar" style="display:none;">
          <div class="avatar-placeholder" id="profileAvatarPlaceholder">U</div>
          <label for="avatarUpload" class="avatar-edit-btn"><i class="fas fa-camera"></i></label>
          <input type="file" id="avatarUpload" accept="image/*" hidden>
        </div>
        <div class="header-info">
          <h2 id="headerName">Loading...</h2>
          <p id="headerRole">Role</p>
          <span class="status-badge">Active</span>
        </div>
      </div>
    </section>

    <!-- Edit Profile Form -->
    <section class="dash-card">
      <div class="card-header">
        <h3><i class="fas fa-user-edit"></i> Personal Information</h3>
      </div>
      <div class="card-body">
        <form id="profileForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="editName" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="editEmail" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>
            <div class="form-group">
              <label>Student ID</label>
              <input type="text" id="editSid" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="editPhone" placeholder="+254 700 000 000">
            </div>
            <div class="form-group full-width">
              <label>Bio / About Me</label>
              <textarea id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="saveProfileBtn">
              <i class="fas fa-save"></i> Save Changes
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Change Password -->
    <section class="dash-card">
      <div class="card-header">
        <h3><i class="fas fa-lock"></i> Change Password</h3>
      </div>
      <div class="card-body">
        <form id="passwordForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="oldPass" required>
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPass" required>
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="confirmPass" required>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-secondary" id="changePassBtn">
              <i class="fas fa-key"></i> Update Password
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
