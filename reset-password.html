<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uzima University — New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <style>
    .auth-container { max-width: 420px; margin: 80px auto; padding: 0 20px; }
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-header h2 { margin: 0 0 8px; color: var(--t1); font-family: 'Space Grotesk', sans-serif; }
    .auth-header p { margin: 0; color: var(--t2); font-size: 0.95rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: var(--t2); font-size: 0.85rem; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--t1); border-radius: 8px; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: var(--accent); }
    .btn-submit { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn-submit:hover { background: #16a34a; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--t2); font-size: 0.9rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div style="font-size: 2rem; color: var(--accent); margin-bottom: 12px;"><i class="fas fa-lock"></i></div>
        <h2>Set New Password</h2>
        <p>Create a strong password for your account.</p>
      </div>
      <form id="resetPasswordForm">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="rpPass" required minlength="8" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="rpConf" required placeholder="Re-enter password">
        </div>
        <button type="submit" class="btn-submit" id="rpBtn">Update Password</button>
      </form>
      <div class="auth-footer">
        <a href="index.html">← Back to Login</a>
      </div>
    </div>
  </div>
  <script type="module" src="js/features/auth.js"></script>
</body>
</html>
