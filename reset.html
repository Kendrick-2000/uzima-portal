<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uzima University — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:var(--bg); font-family:'DM Sans',sans-serif; }
    .auth-card { background:var(--card); padding:32px; border-radius:12px; width:90%; max-width:400px; border:1px solid var(--border); text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    .auth-card h2 { color:var(--t1); margin:0 0 8px; font-family:'Space Grotesk',sans-serif; }
    .auth-card p { color:var(--t2); margin:0 0 24px; font-size:0.9rem; }
    input { width:100%; padding:12px; margin-bottom:16px; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--t1); font-size:1rem; box-sizing:border-box; transition:border 0.2s; }
    input:focus { outline:none; border-color:var(--accent); }
    button { width:100%; padding:14px; background:var(--accent); color:#000; font-weight:600; border:none; border-radius:8px; cursor:pointer; font-size:1rem; transition:opacity 0.2s; }
    button:hover:not(:disabled) { opacity:0.9; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .msg { margin-top:16px; font-size:0.9rem; min-height:20px; }
    .msg.error { color:var(--err); }
    .msg.success { color:var(--success); }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="auth-card" id="resetCard">
    <h2>Set New Password</h2>
    <p>Enter your new password below to secure your account.</p>
    <form id="resetForm">
      <input type="password" id="newPw" placeholder="New password (min 8 chars)" required minlength="8">
      <input type="password" id="confirmPw" placeholder="Confirm new password" required minlength="8">
      <button type="submit" id="submitBtn">Update Password</button>
    </form>
    <p id="statusMsg" class="msg"></p>
  </div>

  <div class="auth-card hidden" id="successCard">
    <h2 style="color:var(--success);">✅ Password Updated</h2>
    <p>Your password has been changed successfully.</p>
    <p style="margin-top:16px; font-size:0.85rem; color:var(--t2);">Redirecting to login...</p>
  </div>

  <script type="module">
    import { pb } from './js/core/pocketbase.js';
    import { toast } from './js/ui/toasts.js';

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const form = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    const resetCard = document.getElementById('resetCard');
    const successCard = document.getElementById('successCard');

    if (!token) {
      statusMsg.textContent = 'Invalid or missing reset token.';
      statusMsg.className = 'msg error';
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('newPw').value;
      const confirm = document.getElementById('confirmPw').value;

      if (pw !== confirm) {
        statusMsg.textContent = 'Passwords do not match.';
        statusMsg.className = 'msg error';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      statusMsg.textContent = '';

      try {
        await pb.collection('users').confirmPasswordReset(token, pw, confirm);
        resetCard.classList.add('hidden');
        successCard.classList.remove('hidden');
        toast.show('Password updated successfully!', 's');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } catch (err) {
        statusMsg.textContent = err.message || 'Reset failed. Link may be expired.';
        statusMsg.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
